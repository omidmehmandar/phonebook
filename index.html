<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دفتر تلفن - تماد مشهد</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    padding: 20px;
    color: #e0e0e0;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 30px;
    padding: 30px;
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
  }

  header h1 {
    font-size: 1.8rem;
    color: #64b5f6;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  header p {
    color: #90a4ae;
    font-size: 0.9rem;
  }

  .contact-info {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 14px;
  }

  .contact-badge {
    background: rgba(100, 181, 246, 0.15);
    border: 1px solid rgba(100, 181, 246, 0.3);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.82rem;
    color: #90caf9;
  }

  .search-box {
    position: sticky;
    top: 10px;
    z-index: 100;
    margin-bottom: 24px;
  }

  .search-box input {
    width: 100%;
    padding: 16px 24px;
    font-size: 1rem;
    border: none;
    border-radius: 50px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    outline: none;
    transition: all 0.3s;
    font-family: inherit;
    text-align: right;
  }

  .search-box input::placeholder { color: #90a4ae; }
  .search-box input:focus {
    background: rgba(255,255,255,0.15);
    border-color: #64b5f6;
    box-shadow: 0 0 0 3px rgba(100,181,246,0.2);
  }

  .stats {
    text-align: center;
    color: #78909c;
    font-size: 0.85rem;
    margin-bottom: 20px;
  }

  .stats span { color: #64b5f6; font-weight: bold; }

  .sections {
    display: grid;
    gap: 16px;
  }

  .section {
    background: rgba(255,255,255,0.04);
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    overflow: hidden;
    transition: all 0.3s;
  }

  .section:hover {
    border-color: rgba(100,181,246,0.3);
    background: rgba(255,255,255,0.06);
  }

  .section-header {
    background: rgba(100,181,246,0.1);
    padding: 12px 20px;
    font-size: 0.95rem;
    font-weight: bold;
    color: #64b5f6;
    border-bottom: 1px solid rgba(100,181,246,0.2);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-header::before {
    content: '';
    width: 4px;
    height: 20px;
    background: #64b5f6;
    border-radius: 2px;
  }

  .entries {
    padding: 8px 0;
  }

  .entry {
    display: flex;
    align-items: center;
    padding: 10px 20px;
    gap: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.2s;
  }

  .entry:last-child { border-bottom: none; }
  .entry:hover { background: rgba(255,255,255,0.04); }

  .entry.hidden { display: none; }

  .entry-role {
    flex: 1;
    font-size: 0.9rem;
    color: #cfd8dc;
  }

  .entry-name {
    font-size: 0.85rem;
    color: #90a4ae;
    min-width: 120px;
    text-align: center;
  }

  .entry-ext {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: flex-start;
  }

  .ext-badge {
    background: rgba(76,175,80,0.15);
    border: 1px solid rgba(76,175,80,0.4);
    color: #a5d6a7;
    padding: 3px 12px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: bold;
    letter-spacing: 0.5px;
  }

  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: #546e7a;
    font-size: 1.1rem;
    display: none;
  }

  .section.all-hidden { display: none; }

  @media (max-width: 600px) {
    .entry { flex-wrap: wrap; gap: 6px; }
    .entry-name { min-width: auto; }
  }
</style>

let totalEntries = 0;

function buildHTML() {
  const container = document.getElementById('sections');
  data.forEach((sec, si) => {
    totalEntries += sec.entries.length;
    const div = document.createElement('div');
    div.className = 'section';
    div.id = 'sec_' + si;
    div.innerHTML = `
      <div class="section-header">${sec.section}</div>
      <div class="entries" id="entries_${si}">
        ${sec.entries.map((e, ei) => `
          <div class="entry" id="e_${si}_${ei}" data-search="${e.role} ${e.name} ${e.ext.join(' ')}">
            <div class="entry-role">${e.role}</div>
            <div class="entry-name">${e.name || ''}</div>
            <div class="entry-ext">${e.ext.map(x => `<span class="ext-badge">${x}</span>`).join('')}</div>
          </div>
        `).join('')}
      </div>`;
    container.appendChild(div);
  });
  updateStats(totalEntries);
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  let shown = 0;
  
  data.forEach((sec, si) => {
    let secVisible = 0;
    sec.entries.forEach((e, ei) => {
      const el = document.getElementById(`e_${si}_${ei}`);
      const match = !q || el.dataset.search.includes(q);
      el.classList.toggle('hidden', !match);
      if (match) secVisible++;
    });
    const secEl = document.getElementById('sec_' + si);
    secEl.classList.toggle('all-hidden', secVisible === 0);
    shown += secVisible;
  });

  updateStats(shown);
  document.getElementById('noResults').style.display = shown === 0 ? 'block' : 'none';
}

function updateStats(count) {
  document.getElementById('stats').innerHTML = `نمایش <span>${count}</span> مورد از <span>${totalEntries}</span> شماره داخلی`;
}

buildHTML();
