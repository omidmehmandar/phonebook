<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دفتر تلفن داخلی - تماد مشهد</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* ===== SCREEN STYLES ===== */
  body {
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    padding: 20px;
    color: #e0e0e0;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 24px;
    padding: 28px;
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
  }

  header h1 {
    font-size: 1.8rem;
    color: #64b5f6;
    margin-bottom: 6px;
  }

  header p {
    color: #90a4ae;
    font-size: 0.9rem;
  }

  .contact-info {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  .contact-badge {
    background: rgba(100, 181, 246, 0.15);
    border: 1px solid rgba(100, 181, 246, 0.3);
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 0.82rem;
    color: #90caf9;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-box {
    flex: 1;
    position: relative;
  }

  .search-box input {
    width: 100%;
    padding: 14px 20px;
    font-size: 1rem;
    border-radius: 50px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    outline: none;
    transition: all 0.3s;
    font-family: inherit;
    text-align: right;
  }

  .search-box input::placeholder { color: #90a4ae; }
  .search-box input:focus {
    background: rgba(255,255,255,0.15);
    border-color: #64b5f6;
    box-shadow: 0 0 0 3px rgba(100,181,246,0.2);
  }

  .btn-print {
    padding: 14px 28px;
    background: linear-gradient(135deg, #42a5f5, #1976d2);
    color: #fff;
    border: none;
    border-radius: 50px;
    font-size: 0.95rem;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.3s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-print:hover {
    background: linear-gradient(135deg, #64b5f6, #42a5f5);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(66,165,245,0.4);
  }

  .stats {
    text-align: center;
    color: #78909c;
    font-size: 0.85rem;
    margin-bottom: 18px;
  }
  .stats span { color: #64b5f6; font-weight: bold; }

  /* Table */
  .table-wrapper {
    background: rgba(255,255,255,0.04);
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
  }

  thead tr {
    background: rgba(100,181,246,0.15);
  }

  thead th {
    padding: 12px 16px;
    color: #64b5f6;
    font-weight: bold;
    border-bottom: 2px solid rgba(100,181,246,0.3);
    text-align: right;
  }

  tbody tr {
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.2s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.05); }
  tbody tr.hidden { display: none; }

  .section-row td {
    background: rgba(100,181,246,0.08);
    color: #64b5f6;
    font-weight: bold;
    padding: 8px 16px;
    border-top: 1px solid rgba(100,181,246,0.2);
    border-bottom: 1px solid rgba(100,181,246,0.2);
    font-size: 0.9rem;
  }

  td {
    padding: 10px 16px;
    color: #cfd8dc;
    vertical-align: middle;
  }

  .td-name { color: #90a4ae; font-size: 0.84rem; }

  .ext-badge {
    display: inline-block;
    background: rgba(76,175,80,0.15);
    border: 1px solid rgba(76,175,80,0.4);
    color: #a5d6a7;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 0.82rem;
    font-weight: bold;
    margin: 1px 2px;
  }

  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: #546e7a;
    font-size: 1.1rem;
    display: none;
  }

  /* Row number */
  .td-num { color: #546e7a; font-size: 0.8rem; text-align: center; }

  /* ===== PRINT STYLES ===== */
  @media print {
    @page {
      size: A4;
      margin: 15mm 12mm;
    }

    body {
      background: #fff !important;
      color: #000 !important;
      padding: 0;
      font-size: 9pt;
      font-family: Tahoma, Arial, sans-serif;
    }

    .controls, .stats, .btn-print { display: none !important; }

    .container { max-width: 100%; }

    header {
      background: #fff !important;
      border: 2px solid #1565c0 !important;
      border-radius: 8px;
      color: #000 !important;
      padding: 12px 16px;
      margin-bottom: 14px;
      backdrop-filter: none;
    }

    header h1 {
      color: #1565c0 !important;
      font-size: 14pt;
    }

    header p { color: #333 !important; font-size: 9pt; }

    .contact-badge {
      background: #e3f2fd !important;
      border: 1px solid #90caf9 !important;
      color: #0d47a1 !important;
      padding: 3px 10px;
      font-size: 8pt;
    }

    .table-wrapper {
      background: transparent !important;
      border: none !important;
      border-radius: 0;
    }

    table { font-size: 8.5pt; border-collapse: collapse; }

    thead tr { background: #1565c0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    thead th {
      color: #fff !important;
      background: #1565c0 !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      padding: 6px 10px;
      border: 1px solid #0d47a1;
      font-size: 9pt;
    }

    tbody tr { border-bottom: 1px solid #ccc !important; }
    tbody tr:hover { background: transparent !important; }

    td { padding: 5px 10px; color: #000 !important; border: 1px solid #ddd; }

    .section-row td {
      background: #e3f2fd !important;
      color: #0d47a1 !important;
      font-weight: bold;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      border: 1px solid #90caf9;
      padding: 5px 10px;
    }

    .td-name { color: #444 !important; }
    .td-num { color: #666 !important; }

    .ext-badge {
      background: #e8f5e9 !important;
      border: 1px solid #81c784 !important;
      color: #1b5e20 !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      font-size: 8pt;
      padding: 1px 7px;
    }

    tbody tr.hidden { display: none !important; }

    /* Avoid breaking section header from its rows */
    tr { page-break-inside: avoid; }
  }
</style>
</head>

let allRows = []; // {secName, role, name, ext, rowEl}
let totalEntries = 0;

function build() {
  const tbody = document.getElementById('tbody');
  let rowNum = 0;

  data.forEach(sec => {
    // Section header row
    const secTr = document.createElement('tr');
    secTr.className = 'section-row';
    secTr.innerHTML = `<td colspan="5">▌ ${sec.section}</td>`;
    tbody.appendChild(secTr);

    sec.entries.forEach(e => {
      rowNum++;
      totalEntries++;
      const tr = document.createElement('tr');
      tr.dataset.search = `${sec.section} ${e.role} ${e.name} ${e.ext.join(' ')}`;

      tr.innerHTML = `
        <td class="td-num">${rowNum}</td>
        <td>${sec.section}</td>
        <td>${e.role}</td>
        <td class="td-name">${e.name || '—'}</td>
        <td>${e.ext.length ? e.ext.map(x => `<span class="ext-badge">${x}</span>`).join(' ') : '—'}</td>
      `;
      tbody.appendChild(tr);
      allRows.push({ secTr, tr });
    });
  });

  updateStats(totalEntries);
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  let shown = 0;

  // First hide all section rows, then show as needed
  const secVisibility = new Map();

  allRows.forEach(({ secTr, tr }) => {
    const match = !q || tr.dataset.search.includes(q);
    tr.classList.toggle('hidden', !match);
    if (match) {
      shown++;
      secVisibility.set(secTr, true);
    } else {
      if (!secVisibility.has(secTr)) secVisibility.set(secTr, false);
    }
  });

  // Show/hide section header rows
  secVisibility.forEach((visible, secTr) => {
    secTr.style.display = visible ? '' : 'none';
  });

  updateStats(shown);
  document.getElementById('noResults').style.display = shown === 0 ? 'block' : 'none';
}

function updateStats(count) {
  document.getElementById('stats').innerHTML = `نمایش <span>${count}</span> مورد از <span>${totalEntries}</span> شماره داخلی`;
}

build();
</script>
</body>
</html>
